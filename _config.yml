# Setup
title: Yanjun Sun
description: 
url: https://auderysun.github.io/audreysun.github.io/
avatar: /dafu_with_me.JPG
paginate: 5
permalink: pretty
cover_image: /bg_sakura.JPG

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec
  - vendor

# Optimize Jekyl SEO Tag
twitter:
  username: audrey_sun
  card: summary
logo: logo.png
social:
  name: Yanjun Sun
  links:
    - https://twitter.com/AudreySun12
    - https://github.com/AuderySun
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed


header_pages:
  - index.html
  - about.md
  - publications.md
  - projects.md
  - cv.md
